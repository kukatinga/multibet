name: Generate Category Pages
on:
  workflow_dispatch:

jobs:
  categories:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write Python script
        run: |
          cat > /tmp/gen_categories.py << 'SCRIPTEOF'
          import os, re, glob, random

          IMGUR_IMAGES = [
              "https://i.imgur.com/ygFk5oT.jpg","https://i.imgur.com/rxC9MAj.jpg",
              "https://i.imgur.com/mG2T8IS.jpg","https://i.imgur.com/jzFnQlJ.jpg",
              "https://i.imgur.com/w6dLBn6.jpg","https://i.imgur.com/z5vDEJs.jpg",
              "https://i.imgur.com/fhUbwy6.jpg","https://i.imgur.com/FlRylsY.jpg",
              "https://i.imgur.com/wHOPtRW.jpg","https://i.imgur.com/S6J5ZEX.jpg",
              "https://i.imgur.com/2H9nodm.jpg","https://i.imgur.com/PqIWVIz.jpg",
              "https://i.imgur.com/r7MIR8x.jpg","https://i.imgur.com/ridLkYv.jpg",
              "https://i.imgur.com/J5P6sSa.jpg","https://i.imgur.com/2ssF86m.jpg",
              "https://i.imgur.com/kc2AIq8.jpg",
          ]

          def get_title(html):
              m = re.search(r'<title>([^<]*)</title>', html)
              if m:
                  t = m.group(1)
                  return re.sub(r'\s*\|\s*MULTIBET.*$', '', t).strip()
              return 'Article'

          def get_description(html):
              m = re.search(r'<meta name="description" content="([^"]*)"', html)
              return m.group(1) if m else ''

          def get_category(html):
              m = re.search(r'<a href="/category/([^/]+)/"[^>]*>([^<]+)</a>', html)
              if m:
                  return m.group(1).strip(), m.group(2).strip()
              return None, None

          def get_date(html):
              m = re.search(r'<span[^>]*>\s*(\w+ \d+, \d{4})\s*</span>', html)
              if not m:
                  m = re.search(r'"datePublished":"([^"T]+)', html)
              return m.group(1).strip() if m else ''

          def get_image(html):
              m = re.search(r'src="(https://i\.imgur\.com/[^"]+)"', html)
              return m.group(1) if m else random.choice(IMGUR_IMAGES)

          def get_slug(filepath):
              parts = filepath.replace('\\', '/').split('/')
              for part in reversed(parts):
                  if part not in ('index.html', ''):
                      return part
              return ''

          print("Scanning pages...")
          categories = {}

          for filepath in glob.glob('**/index.html', recursive=True):
              if filepath == 'index.html':
                  continue
              if '/category/' in filepath.replace('\\', '/'):
                  continue
              try:
                  with open(filepath, 'r', encoding='utf-8', errors='ignore') as f:
                      html = f.read()
                  cat_slug, cat_name = get_category(html)
                  if not cat_slug:
                      continue
                  slug = get_slug(filepath)
                  title = get_title(html)
                  description = get_description(html)
                  date = get_date(html)
                  image = get_image(html)
                  if cat_slug not in categories:
                      categories[cat_slug] = {'name': cat_name, 'articles': []}
                  categories[cat_slug]['articles'].append({
                      'slug': slug, 'title': title,
                      'description': description, 'date': date, 'image': image,
                  })
              except Exception as e:
                  print(f"Error reading {filepath}: {e}")

          print(f"Found {len(categories)} categories: {list(categories.keys())}")

          def card(a):
              return (
                  '<article class="bg-white rounded-xl border border-gray-200 overflow-hidden hover:shadow-lg hover:-translate-y-1 transition-all duration-300 group">'
                  '<a href="/' + a['slug'] + '/"><div class="overflow-hidden h-48">'
                  '<img src="' + a['image'] + '" alt="' + a['title'].replace('"',"'") + '" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">'
                  '</div></a>'
                  '<div class="p-5">'
                  '<div class="flex items-center gap-2 text-xs text-gray-400 mb-3"><i data-lucide="calendar" class="w-3 h-3"></i><span>' + a['date'] + '</span></div>'
                  '<h2 class="font-display font-bold text-gray-900 text-lg leading-tight mb-2 group-hover:text-red-500 transition-colors line-clamp-2">'
                  '<a href="/' + a['slug'] + '/">' + a['title'] + '</a></h2>'
                  '<p class="text-gray-500 text-sm line-clamp-2 mb-4">' + a['description'][:150] + '</p>'
                  '<a href="/' + a['slug'] + '/" class="inline-flex items-center gap-2 text-red-500 text-sm font-semibold">Read More <i data-lucide="arrow-right" class="w-4 h-4"></i></a>'
                  '</div></article>'
              )

          def build_page(cat_slug, cat_name, articles, categories):
              cards = '\n'.join(card(a) for a in articles)
