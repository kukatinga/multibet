name: Apply Perfect Design
on:
  workflow_dispatch

jobs:
  redesign:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Debug - List files
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in root:"
          ls -la
          echo ""
          echo "HTML files found:"
          find . -name "*.html" -type f | head -10
      
      - name: Run redesign script
        run: python3 redesign.py
        
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Apply redesign to all pages"
          file_pattern: '*.html'
