name: Apply Perfect Design
on:
  workflow_dispatch

jobs:
  redesign:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Create Python script
        run: |
          cat > apply_design.py << 'EOF'
# PASTE THE ENTIRE PYTHON SCRIPT HERE (the one I just gave you)
# Copy everything from the previous message
EOF

      - name: Run script
        run: python3 apply_design.py
        
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Apply perfect design to all pages"
          file_pattern: '*.html'
