name: Redesign Pages - Match First Template
on:
  workflow_dispatch:

jobs:
  redesign:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write Python script
        run: |
          cat > /tmp/redesign.py << 'SCRIPTEOF'
          import os
          import re
          import glob
          from datetime import datetime
          import random

          # Image pool for fallbacks
          IMGUR_IMAGES = [
              "https://i.imgur.com/ygFk5oT.jpg", "https://i.imgur.com/rxC9MAj.jpg",
              "https://i.imgur.com/mG2T8IS.jpg", "https://i.imgur.com/jzFnQlJ.jpg",
              "https://i.imgur.com/w6dLBn6.jpg", "https://i.imgur.com/z5vDEJs.jpg",
              "https://i.imgur.com/fhUbwy6.jpg", "https://i.imgur.com/FlRylsY.jpg",
              "https://i.imgur.com/wHOPtRW.jpg", "https://i.imgur.com/S6J5ZEX.jpg",
              "https://i.imgur.com/2H9nodm.jpg", "https://i.imgur.com/PqIWVIz.jpg",
              "https://i.imgur.com/r7MIR8x.jpg", "https://i.imgur.com/ridLkYv.jpg",
              "https://i.imgur.com/J5P6sSa.jpg", "https://i.imgur.com/2ssF86m.jpg",
              "https://i.imgur.com/kc2AIq8.jpg",
          ]

          def extract_metadata(html):
              """Extract all metadata from old HTML"""
              metadata = {
                  'title': '',
                  'description': '',
                  'date': '',
                  'category_slug': 'news',
                  'category_name': 'News',
                  'featured_image': '',
                  'content': '',
                  'read_time': '5'
              }
              
              # Extract title - handle both formats
              title_match = re.search(r'<title>(.*?)(?:\s*\|\s*MULTIBET)?</title>', html, re.DOTALL)
              if title_match:
                  metadata['title'] = title_match.group(1).strip()
              
              # Extract meta description
              desc_match = re.search(r'<meta name="description" content="([^"]*)"', html)
              if not desc_match:
                  desc_match = re.search(r'<meta property="og:description" content="([^"]*)"', html)
              if desc_match:
                  metadata['description'] = desc_match.group(1)
              
              # Extract date from multiple possible locations
              date_patterns = [
                  r'<span[^>]*>([A-Za-z]+ \d{1,2}, \d{4})</span>',
                  r'"datePublished":"([^"T]+)',
                  r'<time[^>]*>([^<]+)</time>',
                  r'<div class="[^"]*date[^"]*"[^>]*>([^<]+)</div>'
              ]
              for pattern in date_patterns:
                  date_match = re.search(pattern, html)
                  if date_match:
                      metadata['date'] = date_match.group(1).strip()
                      break
              
              # If no date found, use current date
              if not metadata['date']:
                  metadata['date'] = datetime.now().strftime('%B %d, %Y')
              
              # Extract category
              cat_match = re.search(r'<a href="/(?:category/)?([^/"]+)/?"[^>]*>([^<]+)</a>.*?(?:Reviews|News|Tips)', html, re.IGNORECASE)
              if cat_match:
                  metadata['category_slug'] = cat_match.group(1).lower()
                  metadata['category_name'] = cat_match.group(2)
              else:
                  # Try to determine from URL structure
                  if '/reviews/' in html:
                      metadata['category_slug'] = 'reviews'
                      metadata['category_name'] = 'Reviews'
                  elif '/predictions/' in html:
                      metadata['category_slug'] = 'predictions'
                      metadata['category_name'] = 'Predictions'
                  elif '/news/' in html:
                      metadata['category_slug'] = 'news'
                      metadata['category_name'] = 'News'
              
              # Extract featured image
              img_patterns = [
                  r'<img[^>]*src="([^"]*)"[^>]*class="[^"]*w-full[^"]*"',
                  r'<img[^>]*class="[^"]*wp-post-image[^"]*"[^>]*src="([^"]*)"',
                  r'<meta property="og:image" content="([^"]*)"'
              ]
              for pattern in img_patterns:
                  img_match = re.search(pattern, html)
                  if img_match:
                      metadata['featured_image'] = img_match.group(1)
                      break
              
              if not metadata['featured_image']:
                  metadata['featured_image'] = random.choice(IMGUR_IMAGES)
              
              # Extract article content - THIS IS THE KEY PART
              # Look for the article content in your actual structure
              content_patterns = [
                  # Pattern from your second template
                  r'<div class="article-content[^>]*>(.*?)</div>\s*<div class="flex items-center justify-between',
                  # Fallback patterns
                  r'<div class="entry-content[^>]*>(.*?)</div>\s*<div class="(?:post|article)-footer',
                  r'<article[^>]*>(.*?)</article>',
                  r'<main[^>]*>.*?<article[^>]*>(.*?)</article>',
                  r'<div class="[^"]*content[^"]*"[^>]*>(.*?)</div>\s*<(?:div|section)[^>]*class="[^"]*(?:share|social|related)'
              ]
              
              for pattern in content_patterns:
                  content_match = re.search(pattern, html, re.DOTALL | re.IGNORECASE)
                  if content_match:
                      raw_content = content_match.group(1)
                      # Clean up the content
                      raw_content = re.sub(r'<script.*?>.*?</script>', '', raw_content, flags=re.DOTALL)
                      raw_content = re.sub(r'<style.*?>.*?</style>', '', raw_content, flags=re.DOTALL)
                      metadata['content'] = raw_content.strip()
                      break
              
              # If still no content, create a fallback
              if not metadata['content']:
                  # Try to extract paragraphs
                  paragraphs = re.findall(r'<p[^>]*>.*?</p>', html, re.DOTALL)
                  if paragraphs:
                      metadata['content'] = '\n'.join(paragraphs[:10])  # Take first 10 paragraphs
                  else:
                      metadata['content'] = '<p>Content could not be extracted automatically.</p>'
              
              # Extract read time
              read_time_match = re.search(r'(\d+)\s*min\s*read', html, re.IGNORECASE)
              if read_time_match:
                  metadata['read_time'] = read_time_match.group(1)
              else:
                  # Calculate approximate read time
                  word_count = len(re.findall(r'\w+', metadata['content']))
                  metadata['read_time'] = str(max(1, round(word_count / 200)))
              
              return metadata

          def add_heading_ids(content):
              """Add IDs to h2 headings for TOC"""
              counter = 0
              def replace_h2(match):
                  nonlocal counter
                  counter += 1
                  heading_text = re.sub(r'<[^>]+>', '', match.group(0)).strip()
                  # Create URL-friendly ID
                  heading_id = re.sub(r'[^a-zA-Z0-9]+', '-', heading_text.lower()).strip('-')
                  if not heading_id:
                      heading_id = f'section-{counter}'
                  return f'<h2 id="{heading_id}">{heading_text}</h2>'
              
              return re.sub(r'<h2[^>]*>(.*?)</h2>', replace_h2, content, flags=re.DOTALL)

          def get_headings(content):
              """Extract h2 headings for TOC"""
              headings = re.findall(r'<h2[^>]*>(.*?)</h2>', content)
              return [re.sub(r'<[^>]+>', '', h).strip() for h in headings if h.strip()]

          def build_toc(headings):
              """Build table of contents HTML"""
              if not headings or len(headings) < 2:
                  return ''
              
              items = []
              for i, heading in enumerate(headings, 1):
                  heading_id = re.sub(r'[^a-zA-Z0-9]+', '-', heading.lower()).strip('-')
                  items.append(f'''
                  <a href="#{heading_id}" class="toc-link block text-gray-700 hover:text-brand-red transition-colors text-sm font-medium" data-num="{i}">{heading}</a>
                  ''')
              
              return f'''
              <!-- Table of Contents -->
              <div class="bg-gray-50 rounded-xl p-6 my-8 border border-gray-200">
                  <div class="flex items-center justify-between mb-4">
                      <h3 class="font-display font-bold text-lg text-gray-900">Table of Contents</h3>
                      <button onclick="toggleToc()" class="text-sm text-brand-red font-medium hover:underline">Hide</button>
                  </div>
                  <nav id="toc" class="space-y-3">
                      {''.join(items)}
                  </nav>
              </div>
              '''

          def get_all_slugs():
              """Get all page slugs for navigation"""
              slugs = []
              for fp in sorted(glob.glob('**/index.html', recursive=True)):
                  if fp == 'index.html' or '/category/' in fp.replace('\\', '/'):
                      continue
                  # Extract slug from path
                  parts = fp.replace('\\', '/').split('/')
                  slug = parts[-2] if len(parts) > 1 and parts[-1] == 'index.html' else parts[-1].replace('.html', '')
                  if slug and slug not in ('index', ''):
                      slugs.append(slug)
              return slugs

          def build_prev_next(current_slug, all_slugs):
              """Build previous/next navigation"""
              if not all_slugs or current_slug not in all_slugs:
                  return '<div></div><div></div>'
              
              idx = all_slugs.index(current_slug)
              prev_html = '<div></div>'
              next_html = '<div></div>'
              
              if idx > 0:
                  prev_slug = all_slugs[idx - 1]
                  prev_title = prev_slug.replace('-', ' ').title()
                  prev_img = random.choice(IMGUR_IMAGES)
                  prev_html = f'''
                  <a href="/{prev_slug}/" class="group flex gap-4 p-4 rounded-xl border border-gray-200 hover:border-brand-red hover:shadow-lg transition-all">
                      <img src="{prev_img}" alt="Previous" class="w-20 h-20 object-cover rounded-lg shrink-0">
                      <div>
                          <span class="text-xs text-brand-red font-semibold uppercase flex items-center gap-1 mb-1">
                              <i data-lucide="arrow-left" class="w-3 h-3"></i>
                              Previous
                          </span>
                          <h4 class="font-semibold text-gray-900 line-clamp-2 group-hover:text-brand-red transition-colors">{prev_title}</h4>
                      </div>
                  </a>
                  '''
              
              if idx < len(all_slugs) - 1:
                  next_slug = all_slugs[idx + 1]
                  next_title = next_slug.replace('-', ' ').title()
                  next_img = random.choice(IMGUR_IMAGES)
                  next_html = f'''
                  <a href="/{next_slug}/" class="group flex gap-4 p-4 rounded-xl border border-gray-200 hover:border-brand-red hover:shadow-lg transition-all text-right sm:text-left sm:flex-row-reverse">
                      <img src="{next_img}" alt="Next" class="w-20 h-20 object-cover rounded-lg shrink-0">
                      <div>
                          <span class="text-xs text-brand-red font-semibold uppercase flex items-center gap-1 mb-1 sm:justify-end">
                              Next
                              <i data-lucide="arrow-right" class="w-3 h-3"></i>
                          </span>
                          <h4 class="font-semibold text-gray-900 line-clamp-2 group-hover:text-brand-red transition-colors">{next_title}</h4>
                      </div>
                  </a>
                  '''
              
              return f'{prev_html}{next_html}'

          def build_related(current_slug, all_slugs):
              """Build related posts HTML"""
              others = [s for s in all_slugs if s != current_slug]
              if not others:
                  return '<p class="text-gray-500 text-sm">No related posts</p>'
              
              picks = random.sample(others, min(3, len(others)))
              items = []
              for slug in picks:
                  title = slug.replace('-', ' ').title()
                  img = random.choice(IMGUR_IMAGES)
                  items.append(f'''
                  <a href="/{slug}/" class="group flex gap-3">
                      <img src="{img}" alt="" class="w-20 h-14 object-cover rounded-lg shrink-0">
                      <div>
                          <h4 class="text-sm font-semibold text-gray-900 line-clamp-2 group-hover:text-brand-red transition-colors">{title}</h4>
                          <span class="text-xs text-gray-500">Latest</span>
                      </div>
                  </a>
                  ''')
              
              return ''.join(items)

          def create_new_page(metadata, slug, all_slugs):
              """Create new HTML page using the first template structure"""
              
              toc_html = build_toc(get_headings(metadata['content']))
              metadata['content'] = add_heading_ids(metadata['content'])
              prev_next_html = build_prev_next(slug, all_slugs)
              related_html = build_related(slug, all_slugs)
              
              return f'''<!DOCTYPE html>
  <html lang="en-US" prefix="og: https://ogp.me/ns#">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>{metadata['title']} | MULTIBET</title>
      <meta name="description" content="{metadata['description']}">
      
      <!-- Fonts -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
      
      <!-- Tailwind CSS -->
      <script src="https://cdn.tailwindcss.com"></script>
      
      <!-- Lucide Icons -->
      <script src="https://unpkg.com/lucide@latest"></script>
      
      <script>
          tailwind.config = {{
              theme: {{
                  extend: {{
                      fontFamily: {{
                          sans: ['Inter', 'sans-serif'],
                          display: ['Space Grotesk', 'sans-serif'],
                      }},
                      colors: {{
                          brand: {{
                              red: '#f84643',
                              dark: '#0a0a0a',
                              gray: '#1a1a1a',
                              light: '#f5f5f5'
                          }}
                      }},
                      animation: {{
                          'marquee': 'marquee 25s linear infinite',
                          'fade-in': 'fadeIn 0.6s ease-out',
                          'slide-up': 'slideUp 0.8s ease-out',
                      }},
                      keyframes: {{
                          marquee: {{
                              '0%': {{ transform: 'translateX(0%)' }},
                              '100%': {{ transform: 'translateX(-100%)' }},
                          }},
                          fadeIn: {{
                              '0%': {{ opacity: '0' }},
                              '100%': {{ opacity: '1' }},
                          }},
                          slideUp: {{
                              '0%': {{ transform: 'translateY(20px)', opacity: '0' }},
                              '100%': {{ transform: 'translateY(0)', opacity: '1' }},
                          }}
                      }}
                  }}
              }}
          }}
      </script>
      
      <style>
          .gradient-text {{
              background: linear-gradient(135deg, #f84643 0%, #ff6b6b 100%);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
              background-clip: text;
          }}
          
          .glass-effect {{
              background: rgba(255, 255, 255, 0.05);
              backdrop-filter: blur(10px);
              border: 1px solid rgba(255, 255, 255, 0.1);
          }}
          
          .hover-lift {{
              transition: transform 0.3s ease, box-shadow 0.3s ease;
          }}
          
          .hover-lift:hover {{
              transform: translateY(-4px);
              box-shadow: 0 20px 40px rgba(248, 70, 67, 0.15);
          }}
          
          .article-content p {{
              margin-bottom: 1.5rem;
              line-height: 1.8;
              color: #374151;
          }}
          
          .article-content h2 {{
              font-family: 'Space Grotesk', sans-serif;
              font-size: 1.875rem;
              font-weight: 700;
              margin-top: 2.5rem;
              margin-bottom: 1rem;
              color: #111827;
              scroll-margin-top: 100px;
          }}
          
          .article-content h3 {{
              font-family: 'Space Grotesk', sans-serif;
              font-size: 1.5rem;
