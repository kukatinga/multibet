          processed = 0
          skipped = 0

          for filepath in glob.glob('**/index.html', recursive=True):
              if filepath == 'index.html':
                  continue
              try:
                  with open(filepath, 'r', encoding='utf-8', errors='ignore') as f:
                      html = f.read()

                  if 'newsx-post-content' not in html:
                      skipped += 1
                      continue

                  title = get_title(html)
                  description = get_meta(html, 'description')
                  cat_slug, cat_name = get_category(html)
                  date = get_date(html)
                  image = get_featured_image(html)
                  content = get_article_content(html)
                  slug = get_slug(filepath)

                  # Build TOC from headings
                  headings = get_h2_headings(content)
                  content = add_heading_ids(content)
                  toc_html = build_toc(headings)

                  # Prev/Next
                  prev_next_html = build_prev_next(slug, all_pages)

                  # Related posts
                  related_html = build_related(slug, all_pages)

                  new_html = build_page(title, description, cat_slug, cat_name, date, image, content, slug, toc_html, prev_next_html, related_html)

                  with open(filepath, 'w', encoding='utf-8') as f:
                      f.write(new_html)

                  processed += 1
                  if processed % 50 == 0:
                      print(f"Processed {processed} pages...")

              except Exception as e:
                  print(f"Error: {filepath}: {e}")
                  skipped += 1

          print(f"Done! Processed: {processed}, Skipped: {skipped}")
