name: Redesign Pages
on:
  workflow_dispatch:

jobs:
  redesign:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Python script
        run: |
          cat > fix_pages.py << 'EOF'
          # PASTE THE ENTIRE PYTHON SCRIPT FROM MY PREVIOUS MESSAGE HERE
          # (The big Python script I just gave you)
          EOF

      - name: Run Python script
        run: python3 fix_pages.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Fix page layouts - Add TOC and proper navigation"
          file_pattern: '*.html'
