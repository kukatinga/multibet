          # Main execution
          print("=" * 50)
          print("Starting page redesign...")
          print("=" * 50)

          # Get all slugs for navigation
          all_slugs = get_all_slugs()
          print(f"Found {len(all_slugs)} pages for navigation")

          # Process all HTML files
          processed = 0
          skipped = 0
          errors = 0

          for filepath in glob.glob('**/*.html', recursive=True):
              # Skip category pages and root index
              if filepath == 'index.html' or '/category/' in filepath.replace('\\', '/'):
                  continue
              
              # Extract slug from path
              if filepath.endswith('/index.html'):
                  slug = filepath.replace('/index.html', '').split('/')[-1]
              else:
                  slug = filepath.replace('.html', '').split('/')[-1]
              
              if not slug or slug in ('index', ''):
                  continue
              
              print(f"\nProcessing: {filepath} (slug: {slug})")
              
              try:
                  # Read file
                  with open(filepath, 'r', encoding='utf-8', errors='ignore') as f:
                      html = f.read()
                  
                  # Extract metadata
                  metadata = extract_metadata(html)
                  
                  # Create backup
                  backup_path = filepath + '.backup'
                  with open(backup_path, 'w', encoding='utf-8') as f:
                      f.write(html)
                  
                  # Generate new HTML
                  new_html = create_new_page(metadata, slug, all_slugs)
                  
                  # Write new file
                  with open(filepath, 'w', encoding='utf-8') as f:
                      f.write(new_html)
                  
                  processed += 1
                  print(f"  ✅ Updated: {metadata['title'][:50]}...")
                  
              except Exception as e:
                  errors += 1
                  print(f"  ❌ Error: {str(e)}")

          print("\n" + "=" * 50)
          print(f"✅ Complete!")
          print(f"   Processed: {processed}")
          print(f"   Errors: {errors}")
          print("=" * 50)
