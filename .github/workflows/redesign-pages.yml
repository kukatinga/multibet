              margin-top: 2rem;
              margin-bottom: 1rem;
              color: #111827;
          }}
          
          .article-content ul {{
              margin-bottom: 1.5rem;
              padding-left: 1.5rem;
          }}
          
          .article-content li {{
              margin-bottom: 0.5rem;
              position: relative;
              padding-left: 1.5rem;
          }}
          
          .article-content li::before {{
              content: '';
              position: absolute;
              left: 0;
              top: 0.6rem;
              width: 6px;
              height: 6px;
              background: #f84643;
              border-radius: 50%;
          }}
          
          .article-content ol {{
              list-style: decimal;
              padding-left: 2rem;
              margin-bottom: 1.5rem;
          }}
          
          .article-content blockquote {{
              border-left: 4px solid #f84643;
              padding-left: 1.5rem;
              margin: 2rem 0;
              font-style: italic;
              color: #4b5563;
              font-size: 1.1rem;
          }}
          
          .article-content a {{
              color: #f84643;
              font-weight: 600;
              text-decoration: underline;
              text-underline-offset: 3px;
          }}
          
          .toc-link {{
              position: relative;
