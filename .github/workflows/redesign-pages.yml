                      <a href="/category/news/" class="text-gray-700 hover:text-brand-red font-medium transition-colors">News</a>
                  </nav>

                  <!-- Actions -->
                  <div class="flex items-center gap-4">
                      <div class="hidden md:flex items-center gap-3">
