name: Redesign Pages V2
on:
  workflow_dispatch:

jobs:
  redesign:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Redesign all HTML pages
        run: |
          python3 << 'PYEOF'
          import os
          import re
          import glob
          import random

          IMGUR_IMAGES = [
              "https://i.imgur.com/ygFk5oT.jpg",
              "https://i.imgur.com/rxC9MAj.jpg",
              "https://i.imgur.com/mG2T8IS.jpg",
              "https://i.imgur.com/jzFnQlJ.jpg",
              "https://i.imgur.com/w6dLBn6.jpg",
              "https://i.imgur.com/z5vDEJs.jpg",
              "https://i.imgur.com/fhUbwy6.jpg",
              "https://i.imgur.com/FlRylsY.jpg",
              "https://i.imgur.com/wHOPtRW.jpg",
              "https://i.imgur.com/S6J5ZEX.jpg",
              "https://i.imgur.com/2H9nodm.jpg",
              "https://i.imgur.com/PqIWVIz.jpg",
              "https://i.imgur.com/r7MIR8x.jpg",
              "https://i.imgur.com/ridLkYv.jpg",
              "https://i.imgur.com/J5P6sSa.jpg",
              "https://i.imgur.com/2ssF86m.jpg",
              "https://i.imgur.com/kc2AIq8.jpg",
          ]

          def get_meta(html, name):
              m = re.search(rf'<meta name="{name}" content="([^"]*)"', html)
              if not m:
                  m = re.search(rf'<meta property="{name}" content="([^"]*)"', html)
              return m.group(1) if m else ''

          def get_title(html):
              m = re.search(r'<title>([^<]*)</title>', html)
              if m:
                  t = m.group(1)
                  return re.sub(r'\s*\|\s*MULTIBET.*$', '', t).strip()
              return 'Article'

          def get_featured_image(html):
              m = re.search(r'class="[^"]*wp-post-image[^"]*"[^>]*src="([^"]*)"', html)
              if not m:
                  m = re.search(r'src="([^"]*)"[^>]*class="[^"]*wp-post-image[^"]*"', html)
              if not m:
                  m = re.search(r'src="(https://i\.imgur\.com/[^"]+)"', html)
              return m.group(1) if m else random.choice(IMGUR_IMAGES)

          def get_category(html):
              m = re.search(r'<a href="/category/([^/]+)/"[^>]*>([^<]+)</a>', html)
              if m:
                  return m.group(1), m.group(2)
              return 'news', 'News'

          def get_date(html):
              m = re.search(r'<div class="newsx-post-date">([^<]+)</div>', html)
              if not m:
                  m = re.search(r'"datePublished":"([^"T]+)', html)
              return m.group(1).strip() if m else ''

          def get_article_content(html):
              # Try to get everything inside newsx-post-content
              m = re.search(r'<div class="newsx-post-content">(.*?)</div>\s*<div class="newsx-static-sharing', html, re.DOTALL)
              if not m:
                  m = re.search(r'<div class="newsx-post-content">(.*?)<div class="newsx-author', html, re.DOTALL)
              if not m:
                  m = re.search(r'<div class="newsx-post-content">(.*?)</article>', html, re.DOTALL)
              if m:
                  content = m.group(1)
                  # Remove TOC plugin
                  content = re.sub(r'<div[^>]*class="[^"]*lwptoc[^"]*"[^>]*>.*?</div>\s*</div>', '', content, flags=re.DOTALL)
                  return content.strip()
              return '<p>Content not found.</p>'

          def get_h2_headings(content):
              """Extract h2 headings for table of contents"""
              headings = re.findall(r'<h2[^>]*>(?:<[^>]+>)*([^<]+)(?:</[^>]+>)*</h2>', content)
              return [h.strip() for h in headings if h.strip()]

          def add_heading_ids(content):
              """Add id attributes to h2 tags for TOC linking"""
              counter = [0]
              def replace_h2(m):
                  counter[0] += 1
                  inner = re.sub(r'<[^>]+>', '', m.group(0)).strip()
                  slug = re.sub(r'[^a-z0-9]+', '-', inner.lower()).strip('-')
                  return f'<h2 id="section-{counter[0]}">{inner}</h2>'
              return re.sub(r'<h2[^>]*>.*?</h2>', replace_h2, content, flags=re.DOTALL)

          def get_slug(filepath):
              parts = filepath.replace('\\', '/').split('/')
              for part in reversed(parts):
                  if part not in ('index.html', ''):
                      return part
              return ''

          def get_all_pages():
              """Get list of all article slugs for prev/next navigation"""
              pages = []
              for fp in sorted(glob.glob('**/index.html', recursive=True)):
                  if fp == 'index.html':
                      continue
                  slug = get_slug(fp)
                  if slug:
                      pages.append(slug)
              return pages

          def build_toc(headings):
              if not headings:
                  return ''
              items = ''
              for i, h in enumerate(headings, 1):
                  items += f'<a href="#section-{i}" class="toc-link block text-gray-700 hover:text-red-500 transition-colors text-sm font-medium py-1" data-num="{i}">{h}</a>\n'
              return f'''
              <div class="bg-gray-50 rounded-xl p-6 my-8 border border-gray-200">
                  <div class="flex items-center justify-between mb-4">
                      <h3 class="font-display font-bold text-lg text-gray-900">Table of Contents</h3>
                      <button onclick="this.closest('.bg-gray-50').querySelector('.toc-body').classList.toggle('hidden');this.textContent=this.textContent==='Hide'?'Show':'Hide'" class="text-sm text-red-500 font-medium hover:underline">Hide</button>
                  </div>
                  <nav class="toc-body space-y-1">
                      {items}
                  </nav>
              </div>'''

          def build_prev_next(slug, all_pages):
              if slug not in all_pages:
                  return ''
              idx = all_pages.index(slug)
              prev_html = ''
              next_html = ''
              if idx > 0:
                  prev_slug = all_pages[idx - 1]
                  prev_img = random.choice(IMGUR_IMAGES)
                  prev_title = prev_slug.replace('-', ' ').title()
                  prev_html = f'''<a href="/{prev_slug}/" class="group flex gap-4 p-4 rounded-xl border border-gray-200 hover:border-red-500 hover:shadow-lg transition-all">
                      <img src="{prev_img}" alt="Previous" class="w-20 h-20 object-cover rounded-lg shrink-0">
                      <div>
                          <span class="text-xs text-red-500 font-semibold uppercase flex items-center gap-1 mb-1">
                              <i data-lucide="arrow-left" class="w-3 h-3"></i> Previous
                          </span>
                          <h4 class="font-semibold text-gray-900 line-clamp-2 group-hover:text-red-500 transition-colors">{prev_title}</h4>
                      </div>
                  </a>'''
              if idx < len(all_pages) - 1:
                  next_slug = all_pages[idx + 1]
                  next_img = random.choice(IMGUR_IMAGES)
                  next_title = next_slug.replace('-', ' ').title()
                  next_html = f'''<a href="/{next_slug}/" class="group flex gap-4 p-4 rounded-xl border border-gray-200 hover:border-red-500 hover:shadow-lg transition-all sm:flex-row-reverse text-right">
                      <img src="{next_img}" alt="Next" class="w-20 h-20 object-cover rounded-lg shrink-0">
                      <div>
                          <span class="text-xs text-red-500 font-semibold uppercase flex items-center gap-1 mb-1 justify-end">
                              Next <i data-lucide="arrow-right" class="w-3 h-3"></i>
                          </span>
                          <h4 class="font-semibold text-gray-900 line-clamp-2 group-hover:text-red-500 transition-colors">{next_title}</h4>
                      </div>
                  </a>'''
              if not prev_html and not next_html:
                  return ''
              return f'<div class="grid sm:grid-cols-2 gap-4 mb-8">{prev_html}{next_html}</div>'

          def build_related(slug, all_pages):
              others = [p for p in all_pages if p != slug]
              picks = random.sample(others, min(3, len(others)))
              items = ''
              for p in picks:
                  img = random.choice(IMGUR_IMAGES)
                  title = p.replace('-', ' ').title()
                  items += f'''<a href="/{p}/" class="group flex gap-3">
                      <img src="{img}" alt="" class="w-20 h-14 object-cover rounded-lg shrink-0">
                      <div>
                          <h4 class="text-sm font-semibold text-gray-900 line-clamp-2 group-hover:text-red-500 transition-colors">{title}</h4>
                      </div>
                  </a>'''
              return items

          def build_page(title, description, category_slug, category_name, date, image, content, slug, toc_html, prev_next_html, related_html):
              return f"""<!DOCTYPE html>
<html lang="en-US">
<head>
